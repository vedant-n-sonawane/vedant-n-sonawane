<rect x="40" y="30" width="1120" height="280" rx="22" fill="#ffffff" fill-opacity="0.045" stroke="url(#borderGrad)" stroke-width="1.2" filter="url(#softShadow)"/><text x="70" y="80" font-family="Consolas, 'SF Mono', Menlo, monospace" font-size="14" letter-spacing="4" fill="#8b949e">ABOUT</text><text x="70" y="118" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="26" font-weight="700" fill="#f0f6fc">Designing distributed, privacy-aware AI systems &#8212;</text><text x="70" y="154" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="26" font-weight="700" fill="#f0f6fc">and shipping the full-stack products around them.</text><text x="70" y="202" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14.5" fill="#8b949e">Final-year Computer Science &amp; Design Engineering student. I build systems that span the full stack &#8212;</text><text x="70" y="224" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14.5" fill="#8b949e">from edge-node inference and federated learning architectures down to the React/Node.js products</text><text x="70" y="246" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14.5" fill="#8b949e">that put them in front of real users.</text>
