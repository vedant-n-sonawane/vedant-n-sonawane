  <circle cx="488.6" cy="55.0" r="4" fill="#39c5cf"/>
  <text x="501" y="60.0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#f0f6fc">LinkedIn</text>

