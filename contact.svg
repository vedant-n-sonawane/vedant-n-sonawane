<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="110" viewBox="0 0 1200 110">
  <defs>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="50%" stop-color="#bc8cff"/>
      <stop offset="100%" stop-color="#f778ba"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#bc8cff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f778ba" stop-opacity="0.55"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#bc8cff" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#bc8cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f778ba" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#f778ba" stop-opacity="0"/>
    </radialGradient>
    <filter id="blurBig" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="1200" height="110" fill="#080b12"/>
  <circle cx="96" cy="16" r="99" fill="url(#glowBlue)" filter="url(#blurBig)"/>
  <circle cx="660" cy="116" r="104" fill="url(#glowPurple)" filter="url(#blurBig)"/>
  <circle cx="1140" cy="11" r="88" fill="url(#glowPink)" filter="url(#blurBig)"/>

  <rect x="346.8" y="33.0" width="104" height="44" rx="22.0" fill="#58a6ff" fill-opacity="0.10" stroke="#58a6ff" stroke-opacity="0.45" stroke-width="1"/>
  <circle cx="366.8" cy="55.0" r="4" fill="#58a6ff"/>
  <text x="379" y="60.0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#f0f6fc">GitHub</text>

