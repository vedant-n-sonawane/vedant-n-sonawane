  <text x="641" y="60.0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#f0f6fc">Portfolio</text>

  <rect x="758.7" y="33.0" width="94" height="44" rx="22.0" fill="#f778ba" fill-opacity="0.10" stroke="#f778ba" stroke-opacity="0.45" stroke-width="1"/>
